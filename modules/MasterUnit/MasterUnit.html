<div class="{{module_id_class}}">
    <div class="jarviswidget">
        <header>
            <span class="widget-icon"> <i class="fa fa-university"></i> </span>
            <h2>Master Data Unit Kerja (Dinas)</h2>
        </header>
        <div>
            <div class="widget-body no-padding">
                <table id="tableMasterUnit" class="table table-striped table-bordered table-hover" width="100%">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>ID Instansi</th>
                            <th>Nama Unit Kerja</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Modal Form -->
<div class="modal fade" id="modalMasterUnit" tabindex="-1" role="dialog">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal">&times;</button>
                <h4 class="modal-title">Form Unit Kerja</h4>
            </div>
            <div class="modal-body">
                <form id="formMasterUnit" class="form-horizontal">
                    <input type="hidden" name="id">
                    <div class="form-group">
                        <label class="col-md-3 control-label">ID Instansi</label>
                        <div class="col-md-9">
                            <input type="text" class="form-control" name="id_instansi" placeholder="Contoh: 1.01">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-md-3 control-label">Nama Unit</label>
                        <div class="col-md-9">
                            <input type="text" class="form-control" name="nama_instansi" placeholder="Contoh: Dinas Kesehatan">
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal">Batal</button>
                <button type="button" class="btn btn-primary btSimpanUnit">Simpan</button>
            </div>
        </div>
    </div>
</div>
