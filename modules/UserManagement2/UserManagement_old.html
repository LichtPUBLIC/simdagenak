<div class="{{module_id_class}}">
    <div class="padding bg-gray-light" style="margin-bottom:10px;">
        <form class="form-horizontal">
            <div class="form-group form-group-sm" style="margin-bottom:0">
                <label class="col-sm-2 control-label" for="formGroupInputSmall">Pilih Group</label>
                <div class="col-sm-6">
                    <select class="cb-group form-control">
                    </select>
                </div>
                <div class="col-sm-2">
                    <button class="btn btn-primary btEditGrup">Edit Group</button>
                </div>
                <div class="col-sm-2">
                    <button class="btn btn-primary btTambahGrup">Tambah Group</button>
                </div>
            </div>
        </form>
    </div>
    <div class="row">
        <div class="col-md-6">
            <div class="box box-solid box-info">
                <div class="box-header">
                    <h3 class="box-title">Daftar User</h3>
                </div>
                <div class="box-body">
                    <div class="col-lg-12 pad">
                        <div class="col-md-2">
                            <button class="btn btn-primary btAddUser">Add User</button>
                        </div>
                        <div class="col-md-2 pull-right">
                            <button class="btn btn-primary filterAllUser">Filter</button>
                        </div>
                        <div class="col-md-7 pull-right">
                            <input class="form-control allusertxt" type="text" placeholder="Cari nama / user id">
                        </div>
                    </div>
                    <div class="table-user-all"></div>
                    <div class="overlay">
                        <i class="fa fa-refresh fa-spin"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-md-6">
            <div class="box box-solid box-info">
                <div class="box-header">
                    <h3 class="box-title">User Group</h3>
                </div>
                <div class="box-body">
                    <div class="col-lg-12 pad">
                        <div class="col-md-2 pull-right">
                            <button class="btn btn-primary filterUserGroup">Filter</button>
                        </div>
                        <div class="col-md-7 pull-right">
                            <input class="form-control userGrupTxt" type="text" placeholder="Cari nama / user id">
                        </div>
                    </div>
                    <div class="table-user-group"></div>
                    <div class="overlay">
                        <i class="fa fa-refresh fa-spin"></i>
                    </div>
                </div>
            </div>
        </div>

        <div id="modal-user" class="hidden">
            <div class="padding">
                <form data-toggle="validator" class="form-horizontal form-user" id="form-user" name="form-user">
                    <input type="hidden" class="form-control" name="flag" id="flag">
                    <input type="hidden" class="form-control" name="uid" id="uid">
                    <input type="hidden" class="form-control group-id" name="group_id" id="group-id">
                    <div class="form-group">
                        <label class="col-sm-4">Username</label>
                        <div class="col-sm-6 ui-widget">
                            <input type="text" class="username form-control" name="username" id="username" required>
                        </div>
                        <div col-sm-2>
                            <a class="btn btn-primary btLoadData" id="btLoadData">Load Data</a>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-4">Nama</label>
                        <div class="col-sm-8">
                            <input type="text" class="nama form-control" name="nama" id="name" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-4">Email</label>
                        <div class="col-sm-8">
                            <input type="email" class="form-control" name="email" id="email" data-error="Format email salah"
                                   required>
                            <div class="help-block with-errors"></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-4">Password</label>
                        <div class="col-sm-8">
                            <input type="password" data-minlength="6" class="form-control password" name="password"
                                   id="password" data-error="Minimal 6 karakter" required>
                            <div class="help-block with-errors"></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-4">Re-type Password</label>
                        <div class="col-sm-8">
                            <input type="password" class="form-control password" id="inputPasswordConfirm"
                                   data-match="#password" data-match-error="Oops, password tidak cocok" required>
                            <div class="help-block with-errors"></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-4">Tahun</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" name="param01" id="tahun">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-4">Aktif</label>
                        <div class="col-sm-8">
                            <select type="text" class="form-control" name="active" id="active">
                                <option value="0">Tidak Aktif</option>
                                <option value="1" selected>Aktif</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-4">Level ID</label>
                        <div class="col-sm-8">
                            <input type="number" class="form-control" name="level_id" id="level_id">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-4">Admin</label>
                        <div class="col-sm-8">
                            <div class="col-sm-2">
                                <input type="checkbox" value="1" name="isadmin" id="isadmin"> Is Admin
                            </div>
                            <!--<div class="col-sm-3">
                                <label>Is Admin</label>
                            </div>-->
                        </div>
                    </div>
                </form>
            </div>
        </div>

    </div>
</div>


<!-- Modal -->
<div id="modal-grup" class="hidden">
    <div class="padding">
        <form data-toggle="validator" class="form-horizontal form-group" id="form-group" name="form-group">
            <input type="hidden" class="form-control" name="flag" id="flag2">
            <input type="hidden" class="form-control group-id" name="group_id" id="group-id2">
            <div class="form-group">
                <label class="col-sm-4">Nama Group</label>
                <div class="col-sm-8">
                    <input type="text" class="namagrup form-control" name="namagrup" id="namagrup" required>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-4">Deskripsi</label>
                <div class="col-sm-8">
                    <input type="text" class="form-control" name="deskripsi" id="deskripsi">
                </div>
            </div>
        </form>
    </div>
</div>
