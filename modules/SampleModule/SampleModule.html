<div class="{{module_id_class}}">
    <div class="box box-primary">
        <div class="box-header">
            <h3 class="box-title">Daftar Modules Aplikasi (sample)</h3>

            <div class="box-tools">
                <div class="input-group input-group-sm" style="width: 250px;">
                    <input type="text" name="table_search" class="form-control pull-right search" placeholder="Filter">

                    <div class="input-group-btn">
                        <button type="submit" class="btn btn-default"><i class="fa fa-search"></i></button>
                    </div>
                </div>
            </div>
        </div>
        <!-- /.box-header -->
        <div class="box-body no-padding">
            <div class="table table-modules"></div>
        </div>

        <div class="overlay">
            <i class="fa fa-refresh fa-spin"></i>
        </div>
    </div>

    <div class="box box-warning">
        <div class="box-header">
            <h3 class="box-title">Combobox</h3>
        </div>

        <div class="box-body">
            <div class="row">
                <div class="col-md-6">
                    <select class="cb-modules form-control">

                    </select>
                </div>

                <div class="col-md-6">
                    <select class="cb-actions form-control">

                    </select>
                </div>
            </div>
        </div>
    </div>

    <div class="box">
        <!-- Button trigger modal -->
        <button type="button" class="btn btn-primary btn-lg" data-toggle="modal" data-target="#myAppModal">
          Launch demo modal
        </button>

        <button class="btnModal"><i class="fa fa-check"></i><span>Open by JS</span></button>
    </div>
</div>
