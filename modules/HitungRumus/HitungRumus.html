<!-- Modal -->
<div id="myModal" class="modal fade" role="dialog">
    <div class="modal-dialog" style="width: 75%;">
        <!-- Modal content-->
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal">&times;</button>
                <h4 class="modal-title">Tambah Data</h4>
            </div>
            <form class="form-horizontal" id="form_input">
                <input type="hidden" name="id">
                <div class="modal-body">
                    <div class="form-group nopadding">
                        <label class="col-sm-2"><strong>id_indikator</strong></label>
                        <div class="col-md-10">
                            <input type="text" class="form-control" name="id_indikator">
                        </div>
                    </div>
                    <div class="form-group nopadding">
                        <label class="col-sm-2"><strong>kode_indikator</strong></label>
                        <div class="col-md-10">
                            <input type="text" class="form-control" name="kode_indikator">
                        </div>
                    </div>
                    <div class="form-group nopadding">
                        <label class="col-sm-2"><strong>indikator</strong></label>
                        <div class="col-md-10">
                            <input type="text" class="form-control" name="indikator">
                        </div>
                    </div>
                </div>
            </form>
            <div class="modal-footer">
                <button type="button" class="btSimpan btn btn-primary">Simpan</button>
                <button type="button" class="btn btn-default" data-dismiss="modal">Batal</button>
            </div>
        </div>

    </div>
