<!-- Modal -->
<div id="myModal" class="modal fade" role="dialog">
    <div class="modal-dialog" style="width: 75%;">
        <!-- Modal content-->
        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal">&times;</button>
                <h4 class="modal-title">Tambah Data</h4>
            </div>
            <form class="form-horizontal" id="form_input">
                <input type="hidden" name="id">
                <div class="modal-body">
                    <div class="form-group nopadding">
                        <label class="col-sm-2"><strong>id_format</strong></label>
                        <div class="col-md-10">
                            <input type="text" class="form-control" name="id_format">
                        </div>
                    </div>
                    <div class="form-group nopadding">
                        <label class="col-sm-2"><strong>title</strong></label>
                        <div class="col-md-10">
                            <input type="text" class="form-control" name="title">
                        </div>
                    </div>
                    <div class="form-group nopadding">
                        <label class="col-sm-2"><strong>grup_format</strong></label>
                        <div class="col-md-10">
                            <input type="text" class="form-control" name="grup_format">
                        </div>
                    </div>
                </div>
            </form>
            <div class="modal-footer">
                <button type="button" class="btSimpan btn btn-primary">Simpan</button>
                <button type="button" class="btn btn-default" data-dismiss="modal">Batal</button>
            </div>
        </div>

    </div>
</div>

<!-- Modal Format Form -->

    <div class="modal-dialog" style="width: 80%">
    <!-- style="width: 50%;--> ">
        <!-- Modal content-->

        <div class="modal-content">
            <div class="modal-header">
                <button type="button" class="close" data-dismiss="modal">&times;</button>
                <h4 class="modal-title titleDataFormat">Tambah Data</h4>
            </div>
            <div class="modal-body">
                <form class="form-horizontal" id="formDataFormat">
                    <input type="hidden" name="id">
                        <div class="form-group nopadding">
                            <label class="col-sm-2"><strong>Tahun</strong></label>
                            <div class="col-md-10">
                                <select name="tahun" id="idTahun" class="form-control">
                                    {{{tahun_options}}}
                                </select>
                            </div>
                        </div>
                    <hr>
                    <div class=" renderedFormat" style="overflow: auto"></div>
                    <input type="hidden" name="kolom1" value="tahun">
                </form>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn btn-primary btSimpanDataFormat">Simpan</button>
                <button type="button" class="btn btn-default" data-dismiss="modal">Batal</button>
            </div>
        </div>
    </div>
</div>
