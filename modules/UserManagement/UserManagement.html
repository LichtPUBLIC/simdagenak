<style type="text/css">
    .jsgrid-row.selected > td, .jsgrid-alt-row.selected > td {
    background: #D5F2FF;
    /*font-weight: bold;*/
    }
</style>

<div class="{{module_id_class}}">
    <div class="row">
        <div class="col-md-6 min-right">
            <div class="box box-primary">
                <div class="box-header">
                    <h3 class="box-title">Daftar Group</h3>
                    <div class="box-tools">
                        <div class="input-group input-group-sm" style="width: 260px;">
                            <div class="input-group-btn">
                                <!-- <button type="submit" class="btn btn-primary btn-add-modul" style="margin-right: 10px">Tambah Modul</button> -->
                            </div>
                            <input type="text" name="table_search" class="form-control pull-right search-module" placeholder="Filter">
                            <div class="input-group-btn">
                                <button type="submit" class="btn btn-default"><i class="fa fa-search"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
                <!-- /.box-header -->
                <div class="box-body no-padding">
                    <div class="table-modules" style="background: rgba(255, 255, 255, .2);"></div>
                </div>
            </div>
        </div>
        <div class="col-md-6 min-left">
            <div class="box box-primary">
                <div class="box-header">
                    <h3 class="box-title judul-user">Daftar User</h3>
                    <div class="box-tools">
                        <div class="input-group input-group-sm">
                            <input type="text" name="table_search" class="form-control pull-right search-action" placeholder="Filter">
                            <div class="input-group-btn">
                                <button type="submit" class="btn btn-default"><i class="fa fa-search"></i></button>
                            </div>
                            <div class="input-group-btn" style="padding-left: 200px">
                                <button type="button" class="btn btn-flat btn-xs btn-success add-user disabled"><i class="fa fa-user"></i></button>
                                <button type="button" class="btn btn-flat btn-xs btn-primary refresh-user disabled" id="btn-refresh-user"><i class="fa fa-refresh"></i></button>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="box-body table-responsive no-padding">
                    <div class="table-actions" style="background: rgba(255, 255, 255, .2);"></div>
                </div>
                <div class="overlay">
                    <i class="fa fa-refresh fa-spin"></i>
                </div>
            </div>
        </div>
    </div>
</div>
<div id="myModal" class="modal fade" role="dialog">
    <div class="modal-dialog modal-md">
    <!-- <div class="modal-dialog modal-lg"> -->
        <!-- Modal content-->
        <div class="modal-content">
            <div class="modal-header">
                    <button type="button" class="close" data-dismiss="modal" aria-label="Close"><span aria-hidden="true">&times;</span></button>
                    <h4 class="modal-title" id="myModalLabel">Modal title</h4>
                </div>
            <div class="modal-body">
                <form data-toggle="validator" class="form-horizontal form-user" id="form-user" name="form-user">
                    <input type="hidden" class="form-control" name="flag" id="flag">
                    <input type="hidden" class="form-control" name="uid" id="uid">
                    <input type="hidden" class="form-control group-id" name="group_id" id="group-id">
                   <!--  <div class="form-group">
                        <label class="col-sm-4">Tambah user Terdaftar</label>
                        <div class="col-sm-5 ui-widget">
                            <select type="text" class="user_terdaftar" name="user_terdaftar" id="user_terdaftar">
                            </select>
                        </div>
                        <div col-sm-2>
                            <a class="btn btn-primary btAddUser" id="btAddUser"><i class="fa fa-plus"></i></a>
                        </div>
                    </div> -->
                    
                    <!-- <div class="form-group">
                        <label class="col-sm-4">Tambah User Baru</label>
                    </div>
                    <hr> -->
                    <div class="form-group">
                        <label class="col-sm-4">Username</label>
                        <div class="col-sm-6 ui-widget">
                            <input type="text" class="username form-control" name="username" id="username" required>
                        </div>
                        <!-- <div col-sm-2>
                            <a class="btn btn-primary btLoadData" id="btLoadData">Load Data</a>
                        </div> -->
                    </div>
                    <div class="form-group">
                        <label class="col-sm-4">Nama</label>
                        <div class="col-sm-8">
                            <input type="text" class="nama form-control" name="nama" id="name" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-4">Email</label>
                        <div class="col-sm-8">
                            <input type="email" class="form-control" name="email" id="email" data-error="Format email salah" required>
                            <div class="help-block with-errors"></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-4">Password</label>
                        <div class="col-sm-8">
                            <input type="password" data-minlength="6" class="form-control password" name="password" id="password" data-error="Minimal 6 karakter" required>
                            <div class="help-block with-errors"></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-4">Re-type Password</label>
                        <div class="col-sm-8">
                            <input type="password" class="form-control password" id="inputPasswordConfirm" data-match="#password" data-match-error="Oops, password tidak cocok" required>
                            <div class="help-block with-errors"></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-4">Tahun</label>
                        <div class="col-sm-4">
                            <input type="text" class="form-control" name="param01" id="tahun">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-4">Aktif</label>
                        <div class="col-sm-4">
                            <select type="text" class="form-control" name="active" id="active">
                                <option value="0">Tidak Aktif</option>
                                <option value="1" selected>Aktif</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-4">Level ID</label>
                        <div class="col-sm-3">
                            <input type="number" class="form-control" name="level_id" id="level_id">
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="col-sm-4">Admin</label>
                        <div class="col-sm-8">
                            <!-- <div class="col-sm-2"> -->
                                <input type="checkbox" value="1" name="isadmin" id="isadmin"> Is Admin
                            <!-- </div> -->
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-default" data-dismiss="modal" style="margin-bottom: 0">Close</button>
                <button type="button" class="btn btn-primary submit" id="submit">Save changes</button>
            </div>
        </div>
    </div>
</div>
