<style>
    .dual-list { display: flex; gap: 20px; align-items: center; margin-top: 20px; }
    .list-container { flex: 1; border: 1px solid #ddd; border-radius: 4px; background: #fff; height: 400px; display: flex; flex-direction: column; }
    .list-header { background: #f5f5f5; padding: 10px; border-bottom: 1px solid #ddd; font-weight: bold; }
    .list-body { flex: 1; overflow-y: auto; padding: 5px; }
    .list-item { padding: 8px 12px; margin-bottom: 5px; background: #f9f9f9; border: 1px solid #eee; border-radius: 3px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
    .list-item:hover { background: #eef7ff; border-color: #3276b1; }
    .list-item .btn-action { padding: 2px 6px; font-size: 12px; }
    .controls { display: flex; flex-direction: column; gap: 10px; }
    .unit-selector { margin-bottom: 20px; background: #fff; padding: 15px; border-radius: 4px; border-left: 4px solid #3276b1; }
</style>

<div class="{{module_id_class}}">
    <div class="unit-selector">
        <label>Pilih Dinas/Instansi:</label>
        <select id="cbMappingUnit" class="form-control" style="width: 300px; display: inline-block; margin-left: 10px;">
            <option value="0">-- Pilih Dinas --</option>
        </select>
    </div>

    <div class="dual-list">
        <!-- Kiri: Tersedia -->
        <div class="list-container">
            <div class="list-header">Matrix Belum Dipakai</div>
            <div class="list-body" id="listAvailable">
                <p class="text-muted text-center" style="margin-top: 20px;">Pilih dinas dulu</p>
            </div>
        </div>

        <div class="controls">
            <i class="fa fa-exchange fa-2x text-muted"></i>
        </div>

        <!-- Kanan: Terpakai -->
        <div class="list-container">
            <div class="list-header">Matrix Sudah Dipakai</div>
            <div class="list-body" id="listAssigned">
                <p class="text-muted text-center" style="margin-top: 20px;">Pilih dinas dulu</p>
            </div>
        </div>
    </div>
</div>
