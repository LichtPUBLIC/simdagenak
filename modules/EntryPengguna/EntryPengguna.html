<div class="{{module_id_class}}">
    <div class="box box-primary">
        <div class="box-primary box">
                <div class="box box-primary pad">
                    <div class="table table-modules">
                        <div class="jarviswidget jarviswidget2 jarviswidget-color-blueDark" id="wid-id-1"
                             data-widget-editbutton="false">
                             <header class="">
                                <span class="widget-icon"> <i class="fa fa-table"></i> </span>
                                <h2>Form Entry Pengguna</h2>
                            </header>

                            <div class="jarviswidget-editbox">
                                    <!-- This area used as dropdown edit box -->
    
                            </div>

                            <div class="widget-body">
                                    <div class="box">
   

                                    </div>   

                                    <form class="form-insert" id="form-pengguna">
                                    
                                    <div class="col-md-6 form-horizontal">
                                        <div class="form-group">
                                            <label class="col-sm-3 control-label">Username</label>
                                            <div class="col-sm-9">
                                                <input type="hidden" class="form-control user_id" name="user_id" id="user_id">
                                                <input type="text" class="form-control" name="f_username" id="f_username">
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label class="col-sm-3 control-label">Password</label>
                                            <div class="col-sm-9">
                                                <input type="password" class="form-control pass1" id="f_password" name="f_password" autocomplete="new-password">
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label class="col-sm-3 control-label">Ulangi Password</label>
                                            <div class="col-sm-9">
                                                <input type="password" class="form-control pass2" id="f_password2"name="f_password2" autocomplete="new-password">
                                                <span id="message"></span>
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label class="col-sm-3 control-label">Nama Lengkap</label>
                                            <div class="col-sm-9">
                                                <input type="text" class="form-control" name="f_nama" id="f_nama">
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label class="col-sm-3 control-label">E-mail</label>
                                            <div class="col-sm-9">
                                                <input type="text" class="form-control" name="f_email" id="f_email">
                                            </div>
                                        </div> 
                                        <div class="form-group">
                                            <label class="col-sm-3 control-label">Group Pengguna</label>
                                            <div class="col-sm-9">
                                                <select class="form-control cb-group" style="width: 100%;" name="group_id" id="group_id"></select>
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label class="col-sm-3 control-label">Aktif</label>
                                            <div class="col-sm-9">                                                
                                                <input type="checkbox" class="smart-form" name="f_aktif" id="f_aktif"  checked="checked" value="1">
                                            </div>
                                        </div>   

                                        <div class="form-group">
                                            <label class="col-sm-3 control-label">Admin</label>
                                            <div class="col-sm-9">
                                                
                                                <input type="checkbox" class="smart-form" name="f_admin" id="f_admin" value="1">
                                            </div>
                                        </div>                           
                                    </div>
                                    
                                    <div class="col-md-6 form-horizontal">
                                                                             
                                        <div class="form-group">
                                            <label class="col-sm-3 control-label">Param 1</label>
                                            <div class="col-sm-9">
                                                <input type="text" class="form-control" name="param01" id="param02">
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label class="col-sm-3 control-label">Param 2</label>
                                            <div class="col-sm-9">
                                                <input type="text" class="form-control" name="param02" id="param02">
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label class="col-sm-3 control-label">Param 3</label>
                                            <div class="col-sm-9">
                                                <input type="text" class="form-control" name="param03" id="param03">
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label class="col-sm-3 control-label">Param 4</label>
                                            <div class="col-sm-9">
                                                <input type="text" class="form-control" name="param04" id="param04">
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label class="col-sm-3 control-label">Param 5</label>
                                            <div class="col-sm-9">
                                                <input type="text" class="form-control" name="param05" id="param05">
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label class="col-sm-3 control-label">Param 6</label>
                                            <div class="col-sm-9">
                                                <input type="text" class="form-control" name="param06" id="param06">
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label class="col-sm-3 control-label">Param 7</label>
                                            <div class="col-sm-9">
                                                <input type="text" class="form-control" name="param07" id="param07">
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label class="col-sm-3 control-label">Param 8</label>
                                            <div class="col-sm-9">
                                                <input type="text" class="form-control" name="param08" id="param08">
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label class="col-sm-3 control-label">Param 9</label>
                                            <div class="col-sm-9">
                                                <input type="text" class="form-control" name="param09" id="param09">
                                            </div>
                                        </div>
                                        <div class="form-group">
                                            <label class="col-sm-3 control-label">Param 10</label>
                                            <div class="col-sm-9">
                                                <input type="text" class="form-control" name="param10" id="param10">
                                            </div>
                                        </div>
                                        
                                    </div>
                                   
                                </form>  
                                <div class="clearfix"></div>
                                 <footer>
                                    <div class="pull-right">
                                        <label class="control-label"></label>
                                        <a class="btn btn-primary save-pengguna">
                                            <i class="fa fa-save"></i> Simpan
                                        </a>
                                    </div>
                                </footer>              
                            </div>       
                           
                            
                        </div>
                    </div>
            </div>
        </div>
    </div>



</div>
